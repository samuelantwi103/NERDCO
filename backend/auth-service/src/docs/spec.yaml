openapi: "3.0.3"
info:
  title: Identity & Authentication Service API
  description: Manages user accounts, organisations, and JWT-based authentication for the Emergency Response Platform.
  version: "1.0.0"

servers:
  - url: http://localhost:3001
    description: Local development

tags:
  - name: Auth
    description: Login, registration, and token management
  - name: Profile
    description: Authenticated user information
  - name: Organizations
    description: Organisation management (hospitals, police stations, fire stations)
  - name: Internal
    description: Endpoints called by other microservices (not exposed to web clients)

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already in use

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and receive JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        "401":
          description: Refresh token invalid or expired

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Logged out — token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Profile ───────────────────────────────────────────────────────────────

  /auth/profile:
    get:
      tags: [Profile]
      summary: Get the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Organizations ─────────────────────────────────────────────────────────

  /organizations:
    get:
      tags: [Organizations]
      summary: List all organisations
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [hospital, police_station, fire_station]
      responses:
        "200":
          description: List of organisations
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Organizations]
      summary: Register a new organisation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Internal ──────────────────────────────────────────────────────────────

  /auth/verify:
    get:
      tags: [Internal]
      summary: Validate a JWT access token (called by other services)
      description: |
        Internal endpoint. Called by Incident, Tracking, and Analytics services
        for explicit service-to-service checks.
        Requires `X-Service-Secret` when `SERVICE_INTERNAL_SECRET` is configured.
        Not intended for direct client use.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer <access_token>"
        - name: X-Service-Secret
          in: header
          required: false
          schema:
            type: string
          description: Required in protected environments; must match `SERVICE_INTERNAL_SECRET`.
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "401":
          description: Token invalid or expired
        "403":
          description: Missing or invalid service secret

# ── Components ───────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          example: "Kwame Mensah"
        email:
          type: string
          format: email
          example: "kwame@ghanapolicehq.gov.gh"
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [system_admin, org_admin, first_responder]
        organization_id:
          type: string
          format: uuid
          description: Required for non-system_admin roles

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/UserSummary"

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
        organization_id:
          type: string
          format: uuid
          nullable: true

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        organization:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            type:
              type: string
              enum: [hospital, police_station, fire_station]

    VerifyResponse:
      type: object
      properties:
        valid:
          type: boolean
        user:
          type: object
          properties:
            sub:
              type: string
              format: uuid
            role:
              type: string
            org:
              type: string
              format: uuid
              nullable: true
            org_type:
              type: string
              enum: [hospital, police_station, fire_station]
              nullable: true

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [hospital, police_station, fire_station]
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time

    OrganizationRequest:
      type: object
      required: [name, type, latitude, longitude]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [hospital, police_station, fire_station]
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        phone:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
