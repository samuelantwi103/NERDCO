# NERDCO — Docker Compose
# Build context is the repository root (../ from this file).
# Usage: docker compose up --build   (run from backend/ directory)
#
# Databases and RabbitMQ are cloud-hosted (Neon + CloudAMQP) — not in this file.
#
# Services:
#   auth-service      → http://localhost:3001
#   incident-service  → http://localhost:3002
#   tracking-service  → http://localhost:3003  (+ ws://localhost:3003/ws/vehicles)
#   analytics-service → http://localhost:3004

version: '3.9'

services:

  auth-service:
    build:
      context: ../
      dockerfile: backend/auth-service/Dockerfile
    container_name: nerdco-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  incident-service:
    build:
      context: ../
      dockerfile: backend/incident-service/Dockerfile
    container_name: nerdco-incident
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./incident-service/.env
    environment:
      - TRACKING_SERVICE_URL=http://tracking-service:3003
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      auth-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  tracking-service:
    build:
      context: ../
      dockerfile: backend/tracking-service/Dockerfile
    container_name: nerdco-tracking
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./tracking-service/.env
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  analytics-service:
    build:
      context: ../
      dockerfile: backend/analytics-service/Dockerfile
    container_name: nerdco-analytics
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - ./analytics-service/.env
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
